<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的勋章</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "微软雅黑", sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
        }
        .page {
            width: 375px;
            min-height: 667px;
            background: #FFF9F0;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 60px;
        }
        /* 顶部导航 */
        .nav-bar {
            height: 56px;
            background: linear-gradient(135deg, #FF9A5C, #FFD966);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-back {
            position: absolute;
            left: 16px;
            font-size: 20px;
            cursor: pointer;
        }
        /* 成就概览 */
        .stats-card {
            margin: 16px;
            background: linear-gradient(135deg, #FF9A5C, #FFD966);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 4px 16px rgba(255, 154, 92, 0.3);
        }
        .stat-item {
            text-align: center;
            color: #fff;
        }
        .stat-number {
            font-size: 24px;
            font-weight: 700;
        }
        .stat-label {
            font-size: 11px;
            margin-top: 4px;
            opacity: 0.9;
        }
        .stat-divider {
            width: 1px;
            background: rgba(255,255,255,0.3);
        }
        /* 勋章展示区 */
        .badge-section {
            margin: 16px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .badge-item {
            background: #fff;
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(255, 154, 92, 0.1);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        .badge-item.unlocked {
            border: 1.5px solid #FFD966;
        }
        .badge-item.unlocked::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255, 217, 102, 0.15) 50%, transparent 60%);
            animation: shine 3s ease-in-out infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        .badge-item.unlocked .badge-icon {
            box-shadow: 0 0 12px rgba(255, 217, 102, 0.6), 0 0 24px rgba(255, 154, 92, 0.3);
        }
        .badge-item.locked {
            opacity: 0.6;
            border: 1.5px solid #e0e0e0;
        }
        .badge-item.locked .badge-icon {
            filter: grayscale(80%);
        }
        .badge-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFF9F0, #ffe8c2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 8px;
        }
        .badge-name {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .badge-condition {
            font-size: 10px;
            color: #999;
        }
        .badge-lock {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 12px;
        }
        /* 分隔线 */
        .divider {
            height: 8px;
            background: #f5f0ea;
            margin: 20px 0;
        }
        /* 零食奖励区 */
        .reward-section {
            margin: 0 16px;
        }
        .reward-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 12px rgba(255, 154, 92, 0.1);
        }
        .reward-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #FFF9F0, #ffe8c2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .reward-info {
            flex: 1;
            min-width: 0;
        }
        .reward-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .reward-condition {
            font-size: 12px;
            color: #999;
            margin-top: 3px;
        }
        .reward-btn {
            padding: 6px 14px;
            border-radius: 12px;
            border: none;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .reward-btn.claimed {
            background: #f0f0f0;
            color: #999;
        }
        .reward-btn.available {
            background: linear-gradient(135deg, #FF9A5C, #FFD966);
            color: #fff;
            box-shadow: 0 2px 8px rgba(255, 154, 92, 0.3);
        }
        .reward-btn.locked {
            background: #f5f5f5;
            color: #999;
        }
        .reward-progress {
            margin-top: 4px;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
        }
        .reward-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF9A5C, #FFD966);
            border-radius: 2px;
        }
        /* 底部激励文字 */
        .bottom-motivation {
            text-align: center;
            padding: 24px 16px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 顶部导航 -->
        <div class="nav-bar">
            <span class="nav-back" onclick="location.href='walk-checkin.html'">←</span>
            我的勋章 🏅
        </div>

        <!-- 成就概览 -->
        <div class="stats-card">
            <div class="stat-item">
                <div class="stat-number">23</div>
                <div class="stat-label">累计打卡(天)</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <div class="stat-number">12</div>
                <div class="stat-label">连续最长(天)</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <div class="stat-number">5</div>
                <div class="stat-label">获得勋章(枚)</div>
            </div>
        </div>

        <!-- 勋章展示区 -->
        <div class="badge-section">
            <div class="section-title">🏅 我的勋章墙</div>
            <div class="badge-grid">
                <!-- 已解锁勋章 -->
                <div class="badge-item unlocked">
                    <div class="badge-icon">🌟</div>
                    <div class="badge-name">初次打卡</div>
                    <div class="badge-condition">连续1天</div>
                </div>
                <div class="badge-item unlocked">
                    <div class="badge-icon">🔥</div>
                    <div class="badge-name">三天小火苗</div>
                    <div class="badge-condition">连续3天</div>
                </div>
                <div class="badge-item unlocked">
                    <div class="badge-icon">💪</div>
                    <div class="badge-name">一周达人</div>
                    <div class="badge-condition">连续7天</div>
                </div>
                <div class="badge-item unlocked">
                    <div class="badge-icon">🏅</div>
                    <div class="badge-name">半月之星</div>
                    <div class="badge-condition">连续15天</div>
                </div>
                <div class="badge-item unlocked">
                    <div class="badge-icon">🎯</div>
                    <div class="badge-name">坚持达人</div>
                    <div class="badge-condition">累计20天</div>
                </div>
                <!-- 锁定勋章 -->
                <div class="badge-item locked">
                    <span class="badge-lock">🔒</span>
                    <div class="badge-icon">👑</div>
                    <div class="badge-name">月度冠军</div>
                    <div class="badge-condition">连续30天</div>
                </div>
                <div class="badge-item locked">
                    <span class="badge-lock">🔒</span>
                    <div class="badge-icon">🏆</div>
                    <div class="badge-name">百日传奇</div>
                    <div class="badge-condition">连续100天</div>
                </div>
                <div class="badge-item locked">
                    <span class="badge-lock">🔒</span>
                    <div class="badge-icon">⭐</div>
                    <div class="badge-name">全勤宝贝</div>
                    <div class="badge-condition">月度每天2次全满</div>
                </div>
                <div class="badge-item locked">
                    <span class="badge-lock">🔒</span>
                    <div class="badge-icon">💎</div>
                    <div class="badge-name">钻石遛主</div>
                    <div class="badge-condition">累计365天</div>
                </div>
            </div>
        </div>

        <!-- 分隔线 -->
        <div class="divider"></div>

        <!-- 零食奖励区 -->
        <div class="reward-section">
            <div class="section-title">🎁 打卡奖励兑换</div>

            <!-- 已领取 -->
            <div class="reward-card">
                <div class="reward-icon">🦴</div>
                <div class="reward-info">
                    <div class="reward-name">磨牙棒</div>
                    <div class="reward-condition">连续打卡3天可领</div>
                </div>
                <button class="reward-btn claimed">已领取</button>
            </div>

            <!-- 可领取 -->
            <div class="reward-card">
                <div class="reward-icon">🐟</div>
                <div class="reward-info">
                    <div class="reward-name">猫条零食</div>
                    <div class="reward-condition">连续打卡7天可领</div>
                </div>
                <button class="reward-btn available">立即领取</button>
            </div>

            <!-- 还差8天 -->
            <div class="reward-card">
                <div class="reward-icon">🧸</div>
                <div class="reward-info">
                    <div class="reward-name">宠物玩具</div>
                    <div class="reward-condition">连续打卡15天可领</div>
                    <div class="reward-progress">
                        <div class="reward-progress-fill" style="width: 47%;"></div>
                    </div>
                </div>
                <button class="reward-btn locked">还差8天</button>
            </div>

            <!-- 还差23天 -->
            <div class="reward-card">
                <div class="reward-icon">🎊</div>
                <div class="reward-info">
                    <div class="reward-name">豪华礼包</div>
                    <div class="reward-condition">连续打卡30天可领</div>
                    <div class="reward-progress">
                        <div class="reward-progress-fill" style="width: 23%;"></div>
                    </div>
                </div>
                <button class="reward-btn locked">还差23天</button>
            </div>
        </div>

        <!-- 底部激励文字 -->
        <div class="bottom-motivation">坚持打卡，好礼不断~ 🐾</div>
    </div>
</body>
</html>
