<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布动态</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, "微软雅黑", sans-serif;
        }
        .page {
            width: 375px;
            min-height: 667px;
            background: #FFF9F0;
            position: relative;
        }
        /* 顶部导航 */
        .nav-bar {
            height: 44px;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .nav-back {
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        .nav-title {
            font-size: 17px;
            font-weight: 600;
            color: #333;
        }
        .nav-publish {
            background: #FF9A5C;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 6px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        /* 选择宠物 */
        .pet-selector {
            padding: 16px;
            background: #fff;
            border-bottom: 1px solid #f0ebe5;
        }
        .pet-selector-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 10px;
        }
        .pet-selector-list {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .pet-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .pet-option-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #FFF3E8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .pet-option.active .pet-option-avatar {
            border-color: #FF9A5C;
            background: #FFF0E5;
            box-shadow: 0 2px 8px rgba(255,154,92,0.3);
        }
        .pet-option-name {
            font-size: 11px;
            color: #666;
        }
        .pet-option.active .pet-option-name {
            color: #FF9A5C;
            font-weight: 500;
        }
        .pet-option-add .pet-option-avatar {
            background: #f5f5f5;
            border: 2px dashed #ccc;
            font-size: 20px;
            color: #ccc;
        }
        /* 文字编辑区 */
        .text-area-wrap {
            padding: 16px;
            background: #fff;
        }
        .text-input {
            width: 100%;
            min-height: 120px;
            border: none;
            outline: none;
            font-size: 15px;
            color: #333;
            line-height: 1.6;
            resize: none;
            background: transparent;
            font-family: -apple-system, "微软雅黑", sans-serif;
        }
        .text-input::placeholder {
            color: #ccc;
        }
        /* 照片上传区 */
        .photo-area {
            padding: 0 16px 16px;
            background: #fff;
            border-bottom: 1px solid #f0ebe5;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .photo-item {
            aspect-ratio: 1;
            border-radius: 8px;
            background: #e8e2dc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            position: relative;
            overflow: hidden;
        }
        .photo-delete {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .photo-add {
            background: #f8f4f0;
            border: 2px dashed #ddd;
            cursor: pointer;
            font-size: 32px;
            color: #ccc;
        }
        /* 附加选项 */
        .options-list {
            margin-top: 12px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        .option-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #f0ebe5;
            cursor: pointer;
        }
        .option-item:last-child {
            border-bottom: none;
        }
        .option-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #333;
        }
        .option-icon {
            font-size: 18px;
        }
        .option-right {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #999;
        }
        .option-arrow {
            font-size: 12px;
            color: #ccc;
        }
        /* 底部提示 */
        .bottom-tip {
            padding: 20px 16px;
            text-align: center;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>
<div class="page">
    <!-- 顶部导航 -->
    <div class="nav-bar">
        <span class="nav-back" onclick="history.back()">← 返回</span>
        <span class="nav-title">发布动态</span>
        <button class="nav-publish">发布</button>
    </div>

    <!-- 选择宠物 -->
    <div class="pet-selector">
        <div class="pet-selector-label">以谁的身份发布：</div>
        <div class="pet-selector-list">
            <div class="pet-option active">
                <div class="pet-option-avatar">🐕</div>
                <div class="pet-option-name">豆豆</div>
            </div>
            <div class="pet-option">
                <div class="pet-option-avatar">🐈</div>
                <div class="pet-option-name">咪咪</div>
            </div>
            <div class="pet-option pet-option-add">
                <div class="pet-option-avatar">➕</div>
                <div class="pet-option-name">添加</div>
            </div>
        </div>
    </div>

    <!-- 文字编辑区 -->
    <div class="text-area-wrap">
        <textarea class="text-input" placeholder="记录毛孩子的快乐瞬间~"></textarea>
    </div>

    <!-- 照片上传区 -->
    <div class="photo-area">
        <div class="photo-grid">
            <div class="photo-item">
                🐕
                <span class="photo-delete">✕</span>
            </div>
            <div class="photo-item">
                🌳
                <span class="photo-delete">✕</span>
            </div>
            <div class="photo-item">
                ☀️
                <span class="photo-delete">✕</span>
            </div>
            <div class="photo-item photo-add">➕</div>
        </div>
    </div>

    <!-- 附加选项 -->
    <div class="options-list">
        <div class="option-item">
            <div class="option-left">
                <span class="option-icon">📍</span>
                <span>所在位置</span>
            </div>
            <div class="option-right">
                <span>朝阳公园</span>
                <span class="option-arrow">›</span>
            </div>
        </div>
        <div class="option-item">
            <div class="option-left">
                <span class="option-icon">👀</span>
                <span>谁可以看</span>
            </div>
            <div class="option-right">
                <span>所有宠物好友</span>
                <span class="option-arrow">›</span>
            </div>
        </div>
        <div class="option-item">
            <div class="option-left">
                <span class="option-icon">🏷️</span>
                <span>标签话题</span>
            </div>
            <div class="option-right">
                <span>#遛弯日常</span>
                <span class="option-arrow">›</span>
            </div>
        </div>
    </div>

    <!-- 底部提示 -->
    <div class="bottom-tip">动态将对你的宠物好友可见 🐾</div>
</div>
</body>
</html>
