<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社区主页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; display: flex; justify-content: center; min-height: 100vh; font-family: -apple-system, "微软雅黑", sans-serif; }
.phone { width: 375px; min-height: 667px; background: #FFF9F0; position: relative; overflow-x: hidden; padding-bottom: 60px; }
.nav-bar { height: 44px; background: #FF9A5C; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 17px; font-weight: 600; position: sticky; top: 0; z-index: 100; }
.filter-scroll { padding: 12px 16px; overflow-x: auto; white-space: nowrap; display: flex; gap: 10px; }
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-btn { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 13px; background: #fff; color: #666; border: 1px solid #eee; cursor: pointer; flex-shrink: 0; }
.filter-btn.active { background: #FF9A5C; color: #fff; border-color: #FF9A5C; }
.tab-bar { display: flex; border-bottom: 1px solid #f0ece6; background: #fff; }
.tab-item { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; color: #666; position: relative; cursor: pointer; }
.tab-item.active { color: #FF9A5C; font-weight: 600; }
.tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 24px; height: 3px; background: #FF9A5C; border-radius: 2px; }
.card-list { padding: 12px 16px; }
.card { display: flex; gap: 12px; background: #fff; border-radius: 16px; padding: 12px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(255,154,92,0.1); }
.card-img { width: 90px; height: 90px; background: #f0ece6; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.card-content { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
.card-title { font-size: 14px; color: #333; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-summary { font-size: 12px; color: #999; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.card-author { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #999; }
.card-author .avatar { width: 18px; height: 18px; background: #FFD966; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.card-stats { font-size: 11px; color: #999; display: flex; gap: 8px; }
.card-tag { font-size: 10px; background: #FFF3E8; color: #FF9A5C; padding: 2px 6px; border-radius: 4px; }
.fab { position: fixed; bottom: 70px; right: calc(50% - 375px/2 + 20px); width: 50px; height: 50px; background: #FF9A5C; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; box-shadow: 0 4px 12px rgba(255,154,92,0.4); cursor: pointer; z-index: 99; }
.tabbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 375px; height: 48px; background: #fff; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #f0ece6; z-index: 100; }
.tabbar-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #999; cursor: pointer; }
.tabbar-item .icon { font-size: 20px; margin-bottom: 2px; }
.tabbar-item.active { color: #FF9A5C; }
</style>
</head>
<body>
<div class="phone">
  <div class="nav-bar">宠物社区</div>
  <div class="filter-scroll">
    <span class="filter-btn active">全部</span>
    <span class="filter-btn">🐕狗狗</span>
    <span class="filter-btn">🐈猫咪</span>
    <span class="filter-btn">🐰兔兔</span>
    <span class="filter-btn">其他</span>
  </div>
  <div class="tab-bar">
    <div class="tab-item active">📚科普知识</div>
    <div class="tab-item">😂趣事分享</div>
    <div class="tab-item">💬交流讨论</div>
  </div>
  <div class="card-list">
    <div class="card">
      <div class="card-img">🐱</div>
      <div class="card-content">
        <div class="card-title">夏天给猫咪降温的5个小妙招</div>
        <div class="card-summary">夏天来了，猫咪怕热怎么办？这几招超实用...</div>
        <div class="card-footer">
          <div class="card-author"><span class="avatar">🐱</span>猫咪小王</div>
          <div class="card-stats"><span>❤️32</span><span>💬12</span></div>
          <span class="card-tag">猫咪</span>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-img">🐶</div>
      <div class="card-content">
        <div class="card-title">金毛幼犬正确的喂养时间表</div>
        <div class="card-summary">科学喂养金毛幼犬，从时间表开始...</div>
        <div class="card-footer">
          <div class="card-author"><span class="avatar">🐶</span>金毛铲屎官</div>
          <div class="card-stats"><span>❤️45</span><span>💬8</span></div>
          <span class="card-tag">狗狗</span>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-img">🐕</div>
      <div class="card-content">
        <div class="card-title">我家柯基今天又卡在沙发底下了😂</div>
        <div class="card-summary">每天都能解锁新的卡住姿势，笑死我了...</div>
        <div class="card-footer">
          <div class="card-author"><span class="avatar">🐕</span>柯基粑粑</div>
          <div class="card-stats"><span>❤️128</span><span>💬36</span></div>
          <span class="card-tag">狗狗</span>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-img">🐈</div>
      <div class="card-content">
        <div class="card-title">布偶猫掉毛太严重了，大家怎么处理的？</div>
        <div class="card-summary">家里到处都是毛，求助各位猫友支招...</div>
        <div class="card-footer">
          <div class="card-author"><span class="avatar">🐈</span>布偶妈妈</div>
          <div class="card-stats"><span>❤️56</span><span>💬24</span></div>
          <span class="card-tag">猫咪</span>
        </div>
      </div>
    </div>
  </div>
  <div class="fab">✏️</div>
</div>
<div class="tabbar">
  <div class="tabbar-item"><span class="icon">🏠</span>首页</div>
  <div class="tabbar-item"><span class="icon">📍</span>周边</div>
  <div class="tabbar-item"><span class="icon">🎉</span>聚会</div>
  <div class="tabbar-item active"><span class="icon">💬</span>社区</div>
  <div class="tabbar-item"><span class="icon">👤</span>我的</div>
</div>
</body>
</html>
